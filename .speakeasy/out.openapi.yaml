      summary: "Get current BeReach credit balance"
      description: "Returns the current credit balance for the workspace. Includes credits used, total limit, remaining credits, usage percentage, and whether credits are unlimited. When isUnlimited is true, limit and remaining are null — skip credit budgeting. No credits consumed."
      tags:
        - "Profile"
      security:
