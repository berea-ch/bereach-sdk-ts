  /visit/linkedin/profile:
    post:
      operationId: "visitLinkedInProfile"
      summary: "Visit LinkedIn profile and extract contact data"
      description: "Authenticates the requester, validates LinkedIn credentials, visits the specified LinkedIn profile, and returns all associated contact data."
      tags:
        - "LinkedIn Scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              profile: "https://www.linkedin.com/in/alexandre-sarfati"
              campaignSlug: "lead-magnet-post-12345"
              actionSlug: "visit-alexandre-sarfati"
            schema:
              type: "object"
              properties:
                profile:
                  description: "LinkedIn profile URL (e.g., 'https://www.linkedin.com/in/username') or profile URN (e.g., 'urn:li:fsd_profile:ACoAABZ0Qo4B6pt58d4FVmts1F7TPi4D1-uL1fw')"
                  type: "string"
                campaignSlug:
                  description: "Campaign identifier for your automation workflow (e.g., 'lead-magnet-post-12345'). Used with actionSlug to prevent duplicate actions."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                actionSlug:
                  description: "Action identifier for this specific profile visit within the campaign (e.g., 'visit-john-doe'). The pair campaignSlug + actionSlug must be unique — if already executed, the API returns duplicate: true and skips the action."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                includePosts:
                  description: "When true, fetches the last 5 posts from the profile (adds a random delay between requests). Defaults to false."
                  type: "boolean"
              required:
                - "profile"
      responses:
        "200":
