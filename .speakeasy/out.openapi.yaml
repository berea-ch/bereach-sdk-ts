  /collect/linkedin/comments:
    post:
      operationId: "collectComments"
      x-speakeasy-name-override: "collectComments"
      summary: "Scrape LinkedIn post comments"
      description: "Returns paginated top-level comments for a LinkedIn post (newest first). 1 credit per 20 items returned (minimum 1 if any results, 0 if empty). Use count=0 for a free total-only check (0 credits, no rate-limit slot consumed). Response includes previousTotal (server-cached) to detect new comments without client tracking."
      tags:
        - "scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              postUrl: "https://www.linkedin.com/feed/update/urn:li:activity:1234567890123456789/"
              start: 0
              count: 100
            schema:
              type: "object"
              properties:
                postUrl:
                  type: "string"
                  description: "LinkedIn post URL to inspect for comments."
                start:
                  description: "Pagination offset (multiples of 100)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Number of comments to fetch per page (0-100, default 100). Use count=0 for a free total-only check (0 credits, no rate-limit slot consumed — can call count=100 immediately after)."
                  type: "integer"
                  minimum: 0
                  maximum: 100
                campaignSlug:
                  description: "When provided, each profile in the response includes actionsCompleted (message/reply/like/visit/connect booleans) and knownDistance (cached memberDistance from recent visits, null if not cached). Enables campaign-aware scraping without manual cross-referencing."
                  type: "string"
              required:
                - "postUrl"
      responses:
        "200":
          description: "List of profiles who commented on the post"
          content:
            application/json:
              example:
                success: true
                profiles:
                  - name: "Sam Smith"
                    headline: "Founder @ Startup"
                    profileUrl: "https://www.linkedin.com/in/sam-smith"
                    imageUrl: "https://media.licdn.com/dms/image/C4D03AQG1/profile-displayphoto-shrink_200_200/0/..."
                    publicIdentifier: "sam-smith"
                    profileUrn: "urn:li:fsd_profile:ACoAABZ0Qo4B6pt58d4FVmts1F7TPi4D1-uL1fw"
                    commentText: "Love this insight!"
                    timestamp: 1731547200000
                    isEdited: false
                    commentUrn: "urn:li:comment:(activity:1234567890123456789,9876543210987654321)"
                    commentHash: "a1b2c3d4e5f6..."
                    isPostAuthor: false
                    repliesCount: 2
                    hasReplyFromPostAuthor: false
                    postUrn: "urn:li:activity:1234567890123456789"
                    postHash: "f6e5d4c3b2a1..."
                    type: "comment"
                count: 1
                total: 12
                start: 0
                hasMore: true
                previousTotal: 10
                creditsUsed: 1
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  profiles:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        name:
                          type: "string"
                        headline:
                          nullable: true
                          type: "string"
                        profileUrl:
                          nullable: true
                          type: "string"
                        imageUrl:
                          nullable: true
                          type: "string"
                        publicIdentifier:
                          nullable: true
                          description: "Vanity slug from profile URL (e.g. john-doe) when not URN-based"
                          type: "string"
                        profileUrn:
                          nullable: true
                          description: "LinkedIn profile URN (e.g. urn:li:fsd_profile:ACoAAA...) when available"
                          type: "string"
                        type:
                          type: "string"
                          enum:
                            - "comment"
                        commentText:
                          type: "string"
                        timestamp:
                          nullable: true
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        isEdited:
                          type: "boolean"
                        commentUrn:
                          description: "Full comment URN — use directly for /reply and /like endpoints. Do NOT reconstruct from hash fields."
                          type: "string"
                        commentHash:
                          description: "SHA256 hash of commentUrn — use for dedup slugs only, not for building URNs."
                          type: "string"
                        isPostAuthor:
                          description: "True if the commenter is the post author."
                          type: "boolean"
                        repliesCount:
                          description: "Number of replies to this comment."
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        hasReplyFromPostAuthor:
                          description: "True if the post author already replied to this comment. Null when unknown (e.g. LinkedIn only preloaded partial replies)."
                          nullable: true
                          type: "boolean"
                        parentCommentUrn:
                          description: "URN of the parent comment, present on replies only."
                          type: "string"
                        postUrn:
                          type: "string"
                        postHash:
                          description: "SHA256 hash of postUrn — use for dedup slugs only."
                          type: "string"
                        actionsCompleted:
                          description: "Per-profile action completion status within the campaign. Only present when campaignSlug is provided in the request."
                          type: "object"
                          properties:
                            message:
                              type: "boolean"
                            reply:
                              type: "boolean"
                            like:
                              type: "boolean"
                            visit:
                              type: "boolean"
                            connect:
                              type: "boolean"
                          required:
                            - "message"
                            - "reply"
                            - "like"
                            - "visit"
                            - "connect"
                          additionalProperties: false
                        knownDistance:
                          nullable: true
                          description: "Cached memberDistance from a recent profile visit (1 = connected, 2 = 2nd degree, etc.). null if campaignSlug not provided or profile not visited recently."
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                      required:
                        - "name"
                        - "headline"
                        - "profileUrl"
                        - "imageUrl"
                        - "publicIdentifier"
                        - "profileUrn"
                        - "type"
                        - "timestamp"
                        - "knownDistance"
                      additionalProperties: false
                  count:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  total:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  start:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  hasMore:
                    type: "boolean"
                  previousTotal:
                    nullable: true
                    description: "The total from your last call to this endpoint for the same post (null on first call). Compare with total to detect new comments without client-side tracking."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  processedCount:
                    description: "Number of returned profiles that already have a completed 'message' action in this campaign. Only present when campaignSlug is provided."
                    type: "integer"
                    minimum: -9007199254740991
