openapi: "3.0.3"
info:
  title: "BeReach API"
  description: "BeReach | Unofficial Linkedin API"
  version: "1.4.0"
  contact:
    name: "BeReach Support"
    email: "alexandre@berea.ch"
    url: "https://berea.ch/api"
  license:
    name: "AGPL-3.0 license"
    url: "https://github.com/berea-ch/bereach/blob/main/LICENSE.md"
servers:
  - url: "https://api.berea.ch"
    description: "Production API"
  - url: "https://api-staging.berea.ch"
    description: "Staging API"
tags:
  - name: "search"
    description: "Search LinkedIn for posts, people, companies, and jobs. Includes parameter resolution (typeahead) for converting text to LinkedIn IDs."
  - name: "salesNav"
    description: "Search LinkedIn Sales Navigator for leads (people) and accounts (companies). Requires an active Sales Navigator subscription."
  - name: "profile"
    description: "Endpoints for the authenticated user's own LinkedIn profile"
  - name: "scrapers"
    description: "Endpoints for scraping LinkedIn interactions (likes, comments, posts)"
  - name: "actions"
    description: "Endpoints for performing LinkedIn actions (visit, connect, message, like, reply, publish)"
  - name: "chat"
    description: "Endpoints for LinkedIn inbox: list conversations, search, read messages"
  - name: "companyPages"
    description: "Endpoints for managing LinkedIn company pages: list, permissions, posts, and actions"
  - name: "campaigns"
    description: "Endpoints for managing campaigns and workflow filtering"
  - name: "contacts"
    description: "Endpoints for managing contacts and lifecycle stages without requiring a campaign"
  - name: "scheduledMessages"
    description: "Endpoints for creating, scheduling, and managing draft DMs"
  - name: "context"
    description: "Endpoints for managing user-defined context entries (ICP, tone, playbook, etc.)"
  - name: "cron"
    description: "Endpoints for managing cron schedules (DM polling, draft send, etc.)"
paths:
  /collect/linkedin/likes:
    post:
      operationId: "collectLikes"
      x-speakeasy-name-override: "collectLikes"
      summary: "Scrape LinkedIn post likes"
      description: "Returns up to 100 profiles per page that reacted to the specified post (LinkedIn API limit). Supports pagination. 1 credit per 20 items returned (minimum 1 if any results, 0 if empty). Use count=0 for a free total-only check."
      tags:
        - "scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              postUrl: "https://www.linkedin.com/feed/update/urn:li:activity:1234567890123456789/"
              start: 0
            schema:
              type: "object"
              properties:
                postUrl:
                  type: "string"
                  description: "LinkedIn post URL to inspect for reactions."
                start:
                  description: "Pagination offset (multiples of 100)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Number of likes to fetch per page (0-100, default 100). LinkedIn caps at 100 per request. Use count=0 for a free total-only check (0 credits, no rate-limit slot consumed)."
                  type: "integer"
                  minimum: 0
                  maximum: 100
              required:
                - "postUrl"
      responses:
        "200":
          description: "List of profiles who liked the post"
          content:
            application/json:
              example:
                success: true
                profiles:
                  - name: "Alex Doe"
                    headline: "Growth Lead @ Example"
                    profileUrl: "https://www.linkedin.com/in/alex-doe"
                    imageUrl: "https://media.licdn.com/dms/image/C4D03AQG1/profile-displayphoto-shrink_200_200/0/..."
                    publicIdentifier: "alex-doe"
                    profileUrn: "urn:li:fsd_profile:ACoAABZ0Qo4B6pt58d4FVmts1F7TPi4D1-uL1fw"
                    type: "like"
                    reactionType: "LIKE"
                count: 1
                total: 250
                start: 0
                hasMore: true
                previousTotal: null
                creditsUsed: 1
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  profiles:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        name:
                          type: "string"
                        headline:
                          nullable: true
                          type: "string"
                        profileUrl:
                          nullable: true
                          type: "string"
                        imageUrl:
                          nullable: true
                          type: "string"
                        publicIdentifier:
                          nullable: true
                          description: "Vanity slug from profile URL (e.g. john-doe) when not URN-based"
                          type: "string"
                        profileUrn:
                          nullable: true
                          description: "LinkedIn profile URN (e.g. urn:li:fsd_profile:ACoAAA...) when available"
                          type: "string"
                        type:
                          type: "string"
                          enum:
                            - "like"
                        reactionType:
                          description: "Reaction type (e.g. 'LIKE', 'CELEBRATE', 'EMPATHY', 'INTEREST', 'PRAISE', 'APPRECIATION')."
                          type: "string"
                      required:
                        - "name"
                        - "headline"
                        - "profileUrl"
                        - "imageUrl"
                        - "publicIdentifier"
                        - "profileUrn"
                        - "type"
                      additionalProperties: false
                  count:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  total:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  start:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  hasMore:
                    type: "boolean"
                  previousTotal:
                    nullable: true
                    description: "The total from your last call to this endpoint for the same post (null on first call). Compare with total to detect new likes without client-side tracking."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  creditsUsed:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Credits consumed by this call (0 for free endpoints, cached results, or duplicates)."
                  retryAfter:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Seconds to wait before making another call of the same type. 0 means no wait needed."
                required:
                  - "success"
                  - "profiles"
                  - "count"
                  - "total"
                  - "start"
                  - "hasMore"
                  - "previousTotal"
                  - "creditsUsed"
                  - "retryAfter"
                additionalProperties: false
