  /visit/linkedin/profile/bulk:
    post:
      operationId: "bulkVisitProfile"
      x-speakeasy-name-override: "bulkVisitProfile"
      summary: "Queue bulk LinkedIn profile visits (fire-and-forget)"
      description: "Queue up to 50 LinkedIn profiles for background visit and CRM enrichment. Returns immediately (~100ms). Cached profiles (distance-1) are resolved instantly at 0 credits. Uncached profiles are processed via a durable background workflow with 2-6s pacing between visits. Multiple calls queue safely (no rejection). Use the batch status endpoint to check progress. Use campaignSlug to auto-add visited contacts to a campaign."
      tags:
        - "scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              profiles:
                - "https://www.linkedin.com/in/john-doe"
                - "https://www.linkedin.com/in/jane-smith"
                - "alexandre-sarfati"
              campaignSlug: "lead-magnet-post-12345"
              includePosts: true
            schema:
              type: "object"
              properties:
                profiles:
                  minItems: 1
                  maxItems: 50
                  type: "array"
                  items:
                    type: "string"
                  description: "LinkedIn profile URLs, vanity names, or URNs (max 50). Duplicates are auto-removed."
                campaignSlug:
                  description: "Auto-add each successfully visited contact to this campaign."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                includePosts:
                  description: "Fetch last 5 posts per profile. Increases processing time."
                  type: "boolean"
                includeComments:
                  description: "Fetch recent comments per profile. Increases processing time."
                  type: "boolean"
                includeAbout:
                  description: "Fetch About section and detailed position descriptions per profile. Increases processing time."
                  type: "boolean"
              required:
                - "profiles"
      responses:
        "202":
