  /search/linkedin/url:
    post:
      operationId: "searchLinkedInByUrl"
      summary: "Search LinkedIn by URL"
      description: "# Search LinkedIn by URL\n\nPaste any LinkedIn search URL and the endpoint will automatically extract the category, keywords, and all filters from it, then execute the search and return structured results.\n\n## When to use this endpoint\n- A user gives you a LinkedIn search URL and you want to get the results programmatically\n- You want to replicate a search the user performed in their browser\n- You want to automate searches based on bookmarked LinkedIn search URLs\n\n## Supported URL formats\nThe endpoint supports all standard LinkedIn search URLs:\n- `https://www.linkedin.com/search/results/people/?keywords=engineer`\n- `https://www.linkedin.com/search/results/content/?keywords=AI&sortBy=%22date_posted%22`\n- `https://www.linkedin.com/search/results/companies/?keywords=startup&companyHqGeo=%5B%22103644278%22%5D`\n- `https://www.linkedin.com/jobs/search/?keywords=frontend&location=Paris`\n- `https://www.linkedin.com/search/results/all/?keywords=test` (treated as people search)\n\n## URL path → Category mapping\n| URL path segment | Category |\n|------------------|----------|\n| `/results/content/` | posts |\n| `/results/people/` | people |\n| `/results/companies/` | companies |\n| `/results/all/` | people |\n| `/jobs/search/` | jobs |\n\n## Extracted parameters\nThe following URL query parameters are parsed and mapped to search filters:\n- `keywords` → keywords\n- `network` → connectionDegree (people)\n- `geoUrn` / `companyHqGeo` → location\n- `industry` → industry\n- `company` / `currentCompany` → currentCompany\n- `pastCompany` → pastCompany\n- `school` → school\n- `profileLanguage` → profileLanguage\n- `connectionOf` → connectionOf\n- `firstName` / `lastName` → firstName / lastName\n- `title` → title\n- `companySize` → companySize (companies)\n- `sortBy` → sortBy\n- `datePosted` → datePosted\n- `f_TPR` → datePosted (jobs)\n- `f_JT` → jobType (jobs)\n- `f_E` → experienceLevel (jobs)\n- `f_WT` → workplaceType (jobs)\n\n## Pagination override\nYou can optionally pass `start` and `count` to override the pagination embedded in the URL.\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              url: "https://www.linkedin.com/search/results/people/?keywords=software%20engineer&network=%5B%22S%22%5D&origin=FACETED_SEARCH"
              count: 10
            schema:
              type: "object"
              properties:
                url:
                  description: "A LinkedIn search URL. The endpoint automatically extracts the category, keywords, and all filters from the URL. Example: 'https://www.linkedin.com/search/results/people/?keywords=engineer&network=%5B%22S%22%5D'"
                  type: "string"
                start:
                  description: "Override pagination offset. If not provided, uses the page from the URL (or defaults to 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Override results per page (default 10, max 50)."
                  type: "integer"
                  minimum: 1
                  maximum: 50
              required:
                - "url"
      responses:
        "200":
          description: "Search results parsed from the LinkedIn URL"
          content:
            application/json:
              example:
                success: true
                category: "people"
                items:
                  - type: "PEOPLE"
                    name: "Alex Rivera"
                    profileUrl: "https://www.linkedin.com/in/alexrivera"
                    headline: "Software Engineer at Meta"
                    location: "New York, NY"
                    profilePicture: null
                    networkDistance: "DISTANCE_2"
                    currentPositions:
                      - company: "Meta"
                        role: "Software Engineer"
                paging:
                  start: 0
                  count: 10
                  total: 500
                hasMore: true
                creditsUsed: 1
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  category:
                    type: "string"
                    enum:
                      - "posts"
                      - "people"
                      - "companies"
                      - "jobs"
                  items:
                    anyOf:
                      - type: "array"
                        items:
                          type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "POST"
                            postUrl:
                              type: "string"
                            text:
                              type: "string"
                            date:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            likesCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            commentsCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            sharesCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            postUrn:
                              type: "string"
                            postId:
                              type: "string"
                            author:
                              type: "object"
                              properties:
                                name:
                                  type: "string"
                                profileUrl:
                                  nullable: true
                                  type: "string"
                                headline:
                                  nullable: true
                                  type: "string"
                                profilePicture:
                                  nullable: true
                                  type: "string"
                                isCompany:
                                  type: "boolean"
                                publicIdentifier:
                                  description: "Vanity slug when not URN-based"
                                  nullable: true
