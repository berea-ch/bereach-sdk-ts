name: Staging SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  push:
    branches:
      - "staging/**"
  workflow_dispatch: {}

jobs:
  generate-and-publish-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install Speakeasy CLI
        run: curl -fsSL https://raw.githubusercontent.com/speakeasy-api/speakeasy/main/install.sh | sh
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}

      - name: Save pre-generation version
        id: pre_version
        run: |
          git fetch origin main --depth=1
          VERSION=$(git show origin/main:package.json | grep '"version"' | head -1 | sed 's/.*"version": "//;s/".*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Point workflow to staging API
        run: |
          sed -i 's|location: https://api.berea.ch|location: https://api-staging.berea.ch|' .speakeasy/workflow.yaml

      - name: Generate SDK via speakeasy run
        run: speakeasy run -t bereach -y
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}

      - name: Install dependencies
        run: npm install

      - name: Set beta version
        run: |
          ORIGINAL="${{ steps.pre_version.outputs.version }}"
          BASE=$(echo "$ORIGINAL" | sed 's/-.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          BETA_VERSION="${MAJOR}.${NEXT_MINOR}.0-beta.${GITHUB_RUN_NUMBER}"
          echo "Original version: $ORIGINAL -> Beta version: $BETA_VERSION"
          npm version "$BETA_VERSION" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish beta
        run: npm publish --tag beta --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
