  /contacts:
    post:
      operationId: "upsertContacts"
      summary: "Create or upsert contacts (no campaign required)"
      description: "Save contacts organically without creating a campaign first. Upserts by LinkedIn URL — if the contact already exists for this user, it updates the name and optional fields. Returns full contact objects with IDs so the AI agent can immediately log activities and update lifecycle stages."
      tags:
        - "Contacts"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              contacts:
                - linkedinUrl: "https://linkedin.com/in/johndoe"
                  name: "John Doe"
                  source: "search_results"
                - linkedinUrl: "https://linkedin.com/in/janesmith"
                  name: "Jane Smith"
                  source: "likes"
                  sourceAngle: "competitor-engagement"
                  lifecycleStage: "lead"
                  hotScore: 75
            schema:
              type: "object"
              properties:
                contacts:
                  description: "Contacts to add (single or bulk)"
                  minItems: 1
                  maxItems: 500
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      linkedinUrl:
                        description: "LinkedIn profile URL, URN, or bare vanity name"
                        type: "string"
                      profileUrn:
                        description: "LinkedIn profile URN (e.g. urn:li:fsd_profile:ACoAAA...). Improves dedup when provided alongside a vanity URL."
                        type: "string"
                      publicIdentifier:
                        description: "LinkedIn vanity slug (e.g. joshuaau). Improves dedup when provided alongside a URN."
                        type: "string"
                      name:
                        description: "Profile name"
                        type: "string"
                      source:
                        description: "How this contact was found. Optional for organic creation (defaults to manual_import), required for campaign-based addition."
                        default: "manual_import"
                        type: "string"
                        enum:
                          - "likes"
                          - "comments"
                          - "reposts"
                          - "posts"
                          - "company_followers"
                          - "search_results"
                          - "manual_import"
                          - "event_attendees"
                          - "group_members"
                          - "engagement_scraping"
                          - "content_search"
                          - "followers_mining"
                          - "people_search"
                          - "job_search"
                          - "company_search"
                          - "network_expansion"
                      sourceAngle:
                        description: "Which lead-gen angle found this (e.g., 'vp-sales-france')"
                        type: "string"
                      lifecycleStage:
                        description: "Initial lifecycle stage"
                        default: "contact"
                        type: "string"
                        enum:
                          - "contact"
                          - "lead"
                          - "qualified"
                          - "approved"
                          - "rejected"
                      hotScore:
                        description: "Contact quality score (0-100)"
                        type: "integer"
                        minimum: 0
                        maximum: 100
