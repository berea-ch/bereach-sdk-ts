  /search/linkedin/parameters:
    get:
      operationId: "resolveParameters"
      x-speakeasy-name-override: "resolveParameters"
      summary: "Resolve text to LinkedIn search parameter IDs (typeahead)"
      description: "# Resolve Search Parameters\n\nConverts human-readable text into LinkedIn numeric IDs required by search filters. This is a **prerequisite step** before using location, industry, company, or school filters in any search endpoint.\n\n## Supported types\n| Type | Description | Use with filter |\n|------|-------------|------------------|\n| `GEO` | Geographic locations (cities, regions, countries) | `location` filter in people, companies, jobs |\n| `COMPANY` | Companies and organizations | `currentCompany`, `pastCompany`, `authorCompany` |\n| `INDUSTRY` | Industries and sectors | `industry`, `authorIndustry` |\n| `SCHOOL` | Schools and universities | `school` filter in people search |\n| `CONNECTIONS` | Your LinkedIn connections by name | Identify connection URNs |\n| `PEOPLE` | Any LinkedIn user by name | Identify profile URNs for `connectionOf` |\n\n## How to use\n```\nStep 1: GET /search/linkedin/parameters?type=GEO&keywords=Paris\n        → [{ id: '105015875', title: 'Paris, Île-de-France, France', type: 'GEO' }]\nStep 2: POST /search/linkedin/people { location: ['105015875'], keywords: 'engineer' }\n        → returns engineers in Paris\n```\n\n## Response format\nEach item contains `id` (the LinkedIn numeric ID to use in filters), `title` (human-readable label), and `type` (the parameter type).\n\n## Tips\n- Use short, specific keywords for best results (e.g. `\"Paris\"` not `\"Paris, France\"`)\n- The API returns up to `limit` results (default 10, max 50)\n- Results are ranked by relevance\n- IDs are stable — you can cache them for repeated searches\n\n**Note**: This is a GET endpoint. Pass `type`, `keywords`, and `limit` as query parameters.\nExample: `GET /search/linkedin/parameters?type=GEO&keywords=Paris&limit=5`"
      tags:
        - "search"
      security:
        - token: []
      parameters:
        - in: "query"
          name: "type"
          schema:
            type: "string"
            enum:
              - "GEO"
              - "COMPANY"
              - "INDUSTRY"
              - "SCHOOL"
              - "CONNECTIONS"
              - "PEOPLE"
            description: "Parameter type to resolve"
          required: true
          description: "Parameter type to resolve"
        - in: "query"
          name: "keywords"
          schema:
            type: "string"
            minLength: 1
            description: "Text to resolve into LinkedIn IDs"
          required: true
          description: "Text to resolve into LinkedIn IDs"
        - in: "query"
          name: "limit"
          schema:
            description: "Max results (default 10, max 50)"
            type: "integer"
            minimum: 1
            maximum: 50
          description: "Max results (default 10, max 50)"
