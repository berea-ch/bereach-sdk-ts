  /search/linkedin:
    post:
      operationId: "searchLinkedIn"
      summary: "Unified LinkedIn Search — posts, people, companies, jobs"
      description: "# Unified LinkedIn Search\n\nThis is the **all-in-one** search endpoint. It accepts any of the 4 categories (posts, people, companies, jobs) and returns structured results.\n\n## When to use this endpoint\nUse this endpoint when you need to search across categories dynamically (e.g. the user chooses the category at runtime). For a simpler interface with category-specific documentation, use the dedicated endpoints:\n- `POST /search/linkedin/posts` — search posts\n- `POST /search/linkedin/people` — search people\n- `POST /search/linkedin/companies` — search companies\n- `POST /search/linkedin/jobs` — search jobs\n- `POST /search/linkedin/url` — search by pasting a LinkedIn search URL\n\n## Two ways to search\n1. **Structured**: pass `category` + `keywords` + optional filters\n2. **URL-based**: pass a LinkedIn search `url` — the endpoint parses it automatically\n\nExplicit parameters always override URL-derived values.\n\n## Keyword syntax (Boolean operators)\nKeywords support LinkedIn Boolean search syntax for precise matching:\n- **Exact phrase**: wrap in double quotes — `\"outreach automation\"` matches only that exact phrase\n- **AND**: both terms required — `outreach AND linkedin` (default when terms are space-separated)\n- **OR**: either term — `CEO OR founder OR owner`\n- **NOT**: exclude — `manager NOT assistant`\n- **Parentheses**: group — `(CEO OR CTO) AND SaaS`\n\nOperators must be **UPPERCASE** (`AND`, `OR`, `NOT`). Lowercase is treated as plain text. Wildcards (`*`) and `+`/`-` are not supported. Precedence: Quotes → Parentheses → NOT → AND → OR.\n\nWithout quotes, a multi-word query like `outreach automation` is treated as `outreach AND automation`, which may return broad results. Use `\"outreach automation\"` for exact matching.\n\n## Resolving filter IDs\nMany filters (location, industry, company, school) require LinkedIn numeric IDs. Use `POST /search/linkedin/parameters` to convert text (e.g. \"San Francisco\") into IDs (e.g. \"103644278\").\n\n## Pagination\nUse `start` (offset, default 0) and `count` (page size, default 10, max 50). The response includes `paging.total` and `hasMore` to control iteration.\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              category: "people"
              keywords: "software engineer"
              connectionDegree:
                - "F"
                - "S"
              location:
                - "103644278"
              industry:
                - "4"
                - "6"
              count: 10
              start: 0
            schema:
              type: "object"
              properties:
                category:
                  description: "Type of search to perform (required unless url is provided)"
                  type: "string"
                  enum:
                    - "posts"
                    - "people"
                    - "companies"
                    - "jobs"
                url:
                  description: "LinkedIn search URL — category and filters are extracted automatically. Explicit params override URL-derived ones."
                  type: "string"
                keywords:
                  description: "Search keywords. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"outreach automation\"), AND to require both terms, OR for alternatives (e.g. CEO OR founder), NOT to exclude (e.g. manager NOT assistant), and parentheses to group (e.g. (CEO OR CTO) AND SaaS). Operators must be UPPERCASE. Without quotes, multi-word queries are treated as AND by default which may return overly broad results — use exact phrases with quotes for precise matching."
                  type: "string"
                sortBy:
                  description: "Sort order (posts & jobs)"
                  type: "string"
                  enum:
                    - "relevance"
                    - "date"
                datePosted:
                  description: "Time filter (posts & jobs)"
                  type: "string"
                  enum:
                    - "past-24h"
                    - "past-week"
                    - "past-month"
                contentType:
                  description: "Media type filter (posts only)"
                  type: "string"
                  enum:
                    - "images"
                    - "videos"
                    - "documents"
                authorIndustry:
                  description: "Author industry IDs (posts only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                authorCompany:
                  description: "Author company IDs (posts only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                connectionDegree:
                  description: "Connection degree: F=1st, S=2nd, O=3rd+ (people only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "F"
                      - "S"
                      - "O"
                firstName:
                  description: "First name filter (people only)"
                  type: "string"
                lastName:
                  description: "Last name filter (people only)"
                  type: "string"
                title:
                  description: "Job title filter (people only). Supports LinkedIn Boolean OR syntax: 'CEO OR CTO OR CMO'. Pipe separators are auto-converted: 'CEO|CTO|CMO' becomes 'CEO OR CTO OR CMO'. Use quotes for exact multi-word titles: '\"Head of Marketing\"'."
                  type: "string"
                connectionOf:
                  description: "Profile URN to find connections of (people only)"
                  type: "string"
                profileLanguage:
                  description: "Profile language codes e.g. ['en','fr'] (people only)"
                  type: "array"
                  items:
                    type: "string"
                school:
                  description: "School IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                location:
                  description: "Geo IDs (people, companies, jobs -- resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                industry:
                  description: "Industry IDs (people, companies -- resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                currentCompany:
                  description: "Current company IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                pastCompany:
                  description: "Past company IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                companySize:
                  description: "Company size: A=1-10, B=11-50, C=51-200, D=201-500, E=501-1K, F=1K-5K, G=5K-10K, H=10K+, I=self (companies only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "A"
                      - "B"
                      - "C"
                      - "D"
                      - "E"
                      - "F"
                      - "G"
                      - "H"
                      - "I"
                jobType:
                  description: "Job type: F=Full-time, P=Part-time, C=Contract, T=Temporary, I=Internship, V=Volunteer, O=Other (jobs only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "F"
                      - "P"
                      - "C"
                      - "T"
                      - "I"
                      - "V"
                      - "O"
                experienceLevel:
                  description: "Experience level: 1=Internship, 2=Entry, 3=Associate, 4=Mid-Senior, 5=Director, 6=Executive (jobs only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "1"
                      - "2"
                      - "3"
                      - "4"
                      - "5"
                      - "6"
                workplaceType:
                  description: "Workplace type: 1=On-site, 2=Remote, 3=Hybrid (jobs only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "1"
                      - "2"
                      - "3"
                start:
                  description: "Pagination offset (default 0)"
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50)"
                  type: "integer"
                  minimum: 1
                  maximum: 50
      responses:
        "200":
          description: "Search results for the specified category"
          content:
            application/json:
              example:
                success: true
                category: "people"
                items:
                  - type: "PEOPLE"
                    name: "Jane Smith"
                    profileUrl: "https://www.linkedin.com/in/janesmith"
                    headline: "Senior Software Engineer at Google"
                    location: "San Francisco Bay Area"
                    profilePicture: null
                    networkDistance: "DISTANCE_2"
                    currentPositions:
                      - company: "Google"
                        role: "Senior Software Engineer"
                    publicIdentifier: "janesmith"
                    profileUrn: "urn:li:fsd_profile:ACoAAB1234567890"
                paging:
                  start: 0
                  count: 10
                  total: 1000
                hasMore: true
                creditsUsed: 1
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  category:
                    type: "string"
                    enum:
                      - "posts"
                      - "people"
                      - "companies"
                      - "jobs"
                  items:
                    anyOf:
                      - type: "array"
                        items:
                          type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "POST"
                            postUrl:
                              type: "string"
                            text:
                              type: "string"
                            date:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            likesCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            commentsCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            sharesCount:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            postUrn:
                              type: "string"
                            postId:
                              type: "string"
                            author:
                              type: "object"
                              properties:
                                name:
                                  type: "string"
                                profileUrl:
                                  nullable: true
                                  type: "string"
                                headline:
                                  nullable: true
                                  type: "string"
                                profilePicture:
                                  nullable: true
