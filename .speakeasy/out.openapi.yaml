              profile: "https://linkedin.com/in/marie-sandre"
              includeMessages: true
            schema:
              type: "object"
              properties:
                profile:
                  description: "Accepts full profile URLs, vanity names (e.g. marie-sandre), or profile URNs. Direct O(1) conversation lookup via LinkedIn's compose API — no search, no inbox scan. 0 credits."
