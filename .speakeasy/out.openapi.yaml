  /search/linkedin/sales-nav:
    post:
      operationId: "searchSalesNav"
      x-speakeasy-name-override: "search"
      summary: "Sales Navigator Search — leads (people) & accounts (companies)"
      description: "# Sales Navigator Search\n\nSearch LinkedIn Sales Navigator for leads (people) or accounts (companies). Requires a LinkedIn account with an active Sales Navigator subscription.\n\n## Two ways to search\n1. **Structured**: pass `category` + optional `keywords` + filters\n2. **URL-based**: pass a Sales Navigator search `url` from your browser — filters are extracted automatically\n\n## Sales Navigator vs Classic search\nSales Navigator returns richer data than classic LinkedIn search:\n- **People**: tenure at company/role, premium status, open profile flag, pending invitation status, detailed positions\n- **Companies**: headcount (employee count)\n- More advanced filters: seniority, function, tenure, include/exclude for company & industry\n\n## Resolving filter IDs\nFilters like location, industry, company, and school require LinkedIn numeric IDs. Use `POST /search/linkedin/parameters` to convert text (e.g. \"San Francisco\") into IDs.\n\n## Pagination\nDefault page size: 25, max: 25. Use `start` (offset) and `count` to paginate. Check `hasMore` and `paging.total` in the response.\n\n## Credits\n1 credit per 10 items returned (minimum 1 if any results, 0 if empty)."
      tags:
        - "salesNav"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              category: "people"
              keywords: "developer"
              tenure:
                - min: 3
              profileLanguage:
                - "en"
              count: 25
              start: 0
            schema:
              type: "object"
              properties:
                category:
                  description: "Type of Sales Navigator search: 'people' (leads) or 'companies' (accounts). Required unless url is provided."
                  type: "string"
                  enum:
                    - "people"
                    - "companies"
                url:
                  description: "Sales Navigator search URL — paste directly from your browser. Category and filters are extracted automatically. Explicit params override URL-derived values. Example: https://www.linkedin.com/sales/search/people?query=..."
                  type: "string"
                keywords:
                  description: "Search keywords. Supports LinkedIn Boolean syntax: use double quotes for exact phrases, AND/OR/NOT operators (UPPERCASE), and parentheses for grouping."
                  type: "string"
                title:
                  description: "Job title keywords (people only). Supports Boolean OR: 'CEO OR CTO OR Founder'."
                  type: "string"
                company:
                  description: "Company filter with include/exclude (people only). Use LinkedIn company IDs. Resolve via /search/linkedin/parameters with type='COMPANY'."
                  type: "object"
                  properties:
                    include:
                      description: "IDs to include"
                      type: "array"
                      items:
                        type: "string"
                    exclude:
                      description: "IDs to exclude"
                      type: "array"
                      items:
                        type: "string"
                industry:
                  description: "Industry filter with include/exclude. Use LinkedIn industry IDs. Resolve via /search/linkedin/parameters with type='INDUSTRY'."
                  type: "object"
                  properties:
                    include:
                      description: "IDs to include"
                      type: "array"
                      items:
                        type: "string"
                    exclude:
                      description: "IDs to exclude"
                      type: "array"
                      items:
                        type: "string"
                location:
                  description: "Geography IDs (people & companies). Resolve via /search/linkedin/parameters with type='GEO'."
                  type: "array"
                  items:
                    type: "string"
                seniority:
                  description: "Seniority levels (people only). Values: '1'=Intern, '2'=Entry, '3'=Associate, '4'=Mid-Senior, '5'=Director, '6'=VP, '7'=CXO, '8'=Partner, '9'=Owner, '10'=Training."
                  type: "array"
                  items:
                    type: "string"
                function:
                  description: "Job function IDs (people only). Resolve via /search/linkedin/parameters."
                  type: "array"
                  items:
                    type: "string"
                tenure:
                  description: "Years at current company (people only). Array of ranges, e.g. [{min:3}, {max:10}]."
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      min:
                        description: "Minimum years"
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      max:
                        description: "Maximum years"
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                profileLanguage:
                  description: "Profile language codes e.g. ['en','fr'] (people only)."
                  type: "array"
                  items:
                    type: "string"
                connectionDegree:
                  description: "Network distance: '1'=1st, '2'=2nd, '3'=3rd+ (people only)."
                  type: "array"
                  items:
                    type: "string"
                school:
                  description: "School IDs (people only). Resolve via /search/linkedin/parameters."
                  type: "array"
                  items:
                    type: "string"
                yearsOfExperience:
                  description: "Overall years of experience ranges (people only). Values: 'lessThanOne', 'oneToTwo', 'threeToFive', 'sixToTen', 'moreThanTen'."
                  type: "array"
                  items:
                    type: "string"
                companyHeadcount:
                  description: "Employee count ranges (companies only). Values: 'A'=1-10, 'B'=11-50, 'C'=51-200, 'D'=201-500, 'E'=501-1K, 'F'=1K-5K, 'G'=5K-10K, 'H'=10K+."
                  type: "array"
                  items:
                    type: "string"
                companyType:
                  description: "Company types (companies only). Values: 'C'=Public, 'D'=Educational, 'N'=Non-profit, 'O'=Privately Held, 'P'=Partnership, 'S'=Self-Employed, 'G'=Government."
                  type: "array"
                  items:
                    type: "string"
                annualRevenue:
                  description: "Annual revenue ranges (companies only)."
                  type: "array"
                  items:
                    type: "string"
                start:
                  description: "Pagination offset (default 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 25, max 25)."
                  type: "integer"
                  minimum: 1
                  maximum: 25
