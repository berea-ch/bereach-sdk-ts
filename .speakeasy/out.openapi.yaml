                    postUrn: "urn:li:activity:1234567890"
                    postId: "1234567890"
                    type: "activity"
                count: 1
                total: 42
                start: 0
                hasMore: true
                paginationToken: "abc123-pagination-token"
                creditsUsed: 1
                retryAfter: 0
