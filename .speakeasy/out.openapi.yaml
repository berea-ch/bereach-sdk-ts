  /collect/linkedin/comments/replies:
    post:
      operationId: "collectLinkedInCommentReplies"
      summary: "Scrape replies to a LinkedIn comment"
      description: "Returns paginated replies for a specific LinkedIn comment. Use the commentUrn from the comments endpoint response."
      tags:
        - "LinkedIn Scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              commentUrn: "urn:li:comment:(activity:7654321098765432100,1234567890)"
            schema:
              type: "object"
              properties:
                commentUrn:
                  description: "Comment URN returned by the comments endpoint (e.g., 'urn:li:comment:(activity:123456,789)')."
                  type: "string"
                start:
                  description: "Pagination offset (default 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
              required:
                - "commentUrn"
      responses:
        "200":
          description: "List of replies to the comment"
          content:
            application/json:
