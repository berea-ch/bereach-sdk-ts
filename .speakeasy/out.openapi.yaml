      description: "# Search LinkedIn Jobs\n\nFind job listings on LinkedIn by keywords, location, job type, experience level, and workplace type.\n\n## Parameters\n- **keywords** (optional): Search terms matched against job title, company name, and description\n\n## Keyword syntax (Boolean operators)\nKeywords support LinkedIn Boolean search syntax:\n- **Exact phrase**: `\"frontend engineer\"` — matches only that exact title\n- **AND**: `React AND TypeScript` — both terms required (spaces default to AND)\n- **OR**: `\"frontend engineer\" OR \"front-end developer\"` — either term\n- **NOT**: `engineer NOT intern` — exclude unwanted terms\n- **Parentheses**: `(React OR Vue) AND \"senior engineer\"` — group logic\n\nOperators must be **UPPERCASE**. Precedence: Quotes > Parentheses > NOT > AND > OR.\n\n## Available filters\n| Filter | Type | Description | Resolve IDs via |\n|--------|------|-------------|------------------|\n| `location` | string[] | Geo IDs | `/search/linkedin/parameters` type=`GEO` |\n| `datePosted` | string | `\"past-24h\"` \\| `\"past-week\"` \\| `\"past-month\"` | — |\n| `sortBy` | string | `\"relevance\"` \\| `\"date\"` | — |\n| `jobType` | string[] | Employment type codes (see below) | — |\n| `experienceLevel` | string[] | Seniority codes (see below) | — |\n| `workplaceType` | string[] | Work location codes (see below) | — |\n\n### Job type codes\n| Code | Type |\n|------|------|\n| `F` | Full-time |\n| `P` | Part-time |\n| `C` | Contract |\n| `T` | Temporary |\n| `I` | Internship |\n| `V` | Volunteer |\n| `O` | Other |\n\n### Experience level codes\n| Code | Level |\n|------|-------|\n| `1` | Internship |\n| `2` | Entry level |\n| `3` | Associate |\n| `4` | Mid-Senior level |\n| `5` | Director |\n| `6` | Executive |\n\n### Workplace type codes\n| Code | Type |\n|------|------|\n| `1` | On-site |\n| `2` | Remote |\n| `3` | Hybrid |\n\n## Response fields (per item)\n| Field | Type | Description |\n|-------|------|-------------|\n| `title` | string | Job title |\n| `company` | string\\|null | Hiring company name |\n| `companyUrl` | string\\|null | Company LinkedIn page URL |\n| `companyLogo` | string\\|null | Company logo URL |\n| `location` | string\\|null | Job location |\n| `workplaceType` | string\\|null | On-site / Remote / Hybrid |\n| `postedAt` | string\\|null | Human-readable posting time (e.g. `\"2 days ago\"`) |\n| `jobUrl` | string | Direct URL to the job listing |\n| `listingId` | string | LinkedIn job listing ID |\n\n## Pagination\n- Default page size: 10, max: 50\n- Use `start` + `count` to paginate. Check `hasMore` for more pages.\n\n## Example workflows\n1. **Job monitoring**: Search by title + location → track new openings in your area\n2. **Competitive hiring analysis**: Search by company keywords → see what roles competitors are hiring for\n3. **Market demand research**: Search by skills → gauge demand for specific expertise\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              keywords: "frontend engineer"
              location:
                - "102095887"
              jobType:
                - "F"
              workplaceType:
                - "2"
              experienceLevel:
                - "3"
                - "4"
              count: 10
              start: 0
            schema:
              type: "object"
              properties:
                keywords:
                  description: "Search keywords. Matches against job title, company name, and description. Optional — you can search by filters alone. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"frontend engineer\"), AND to require both terms, OR for alternatives (e.g. React OR Vue OR Angular), NOT to exclude (e.g. engineer NOT intern), and parentheses to group (e.g. (React OR Vue) AND \"senior engineer\"). Operators must be UPPERCASE."
                  type: "string"
                url:
                  description: "Optional LinkedIn search URL. If provided, keywords and filters are extracted from the URL. Explicit params override URL-derived values."
                  type: "string"
                location:
                  description: "Filter by job location. Array of LinkedIn geo IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='GEO'."
                  type: "array"
                  items:
                    type: "string"
                datePosted:
                  description: "Filter by posting date. Useful for finding recently posted jobs."
                  type: "string"
                  enum:
                    - "past-24h"
                    - "past-week"
                    - "past-month"
                sortBy:
                  description: "Sort order. 'relevance' (default) or 'date' (most recent first)."
                  type: "string"
                  enum:
                    - "relevance"
                    - "date"
                jobType:
                  description: "Filter by employment type. Multiple values accepted (OR logic). Codes: F=Full-time, P=Part-time, C=Contract, T=Temporary, I=Internship, V=Volunteer, O=Other."
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "F"
                      - "P"
                      - "C"
                      - "T"
                      - "I"
                      - "V"
                      - "O"
                experienceLevel:
                  description: "Filter by seniority. Multiple values accepted (OR logic). Codes: 1=Internship, 2=Entry level, 3=Associate, 4=Mid-Senior level, 5=Director, 6=Executive."
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "1"
                      - "2"
                      - "3"
                      - "4"
                      - "5"
                      - "6"
                workplaceType:
                  description: "Filter by workplace type. Multiple values accepted (OR logic). Codes: 1=On-site, 2=Remote, 3=Hybrid."
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "1"
                      - "2"
                      - "3"
                start:
                  description: "Pagination offset (default 0). Use multiples of `count` to page through results."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50)."
                  type: "integer"
                  minimum: 1
                  maximum: 50
