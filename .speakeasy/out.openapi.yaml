                    type: "boolean"
                    enum:
                      - true
                  credits:
                    type: "object"
                    properties:
                      current:
                        description: "Number of credits used in the current billing period"
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      limit:
                        description: "Maximum credits available for the workspace, or null if unlimited"
                        nullable: true
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      remaining:
                        description: "Credits remaining before hitting the limit, or null if unlimited"
                        nullable: true
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      percentage:
                        description: "Percentage of credits used (0-100, capped at 100, rounded to 2 decimal places). 0 when unlimited"
                        type: "number"
                      isUnlimited:
                        description: "Whether the workspace has unlimited credits (Pro plan). When true, limit and remaining are null"
                        type: "boolean"
                    required:
                      - "current"
                      - "limit"
                      - "remaining"
                      - "percentage"
                      - "isUnlimited"
                    additionalProperties: false
