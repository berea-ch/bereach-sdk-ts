      operationId: "getStatus"
      x-speakeasy-name-override: "getStatus"
      summary: "Query per-profile action status within a campaign"
      description: "Returns which actions (message, reply, like, visit, connect) have been completed for each profile within a campaign. Replaces the slug-based filter endpoint — query by profile URLs instead of building slug lists. 0 credits, no rate limit."
      tags:
        - "campaigns"
