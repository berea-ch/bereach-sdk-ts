  /search/linkedin/sales-nav/people:
    post:
      operationId: "searchSalesNavPeople"
      summary: "Sales Navigator People/Lead Search"
      description: "# Sales Navigator People Search\n\nSearch for leads in LinkedIn Sales Navigator with advanced filters. Returns enriched profile data including tenure, premium status, and open profile flag.\n\n## Available filters\n| Filter | Type | Description |\n|--------|------|-------------|\n| `keywords` | string | Search terms |\n| `title` | string | Job title keywords |\n| `company` | {include?, exclude?} | Company IDs with include/exclude |\n| `industry` | {include?, exclude?} | Industry IDs with include/exclude |\n| `location` | string[] | Geography IDs |\n| `seniority` | string[] | Seniority levels (1-10) |\n| `function` | string[] | Job function IDs |\n| `tenure` | {min?, max?}[] | Years at current company |\n| `profileLanguage` | string[] | Profile language codes |\n| `connectionDegree` | string[] | Network distance (1, 2, 3) |\n| `school` | string[] | School IDs |\n| `yearsOfExperience` | string[] | Experience ranges |\n\n## Response fields (per item)\n| Field | Type | Description |\n|-------|------|-------------|\n| `id` | string | Sales Navigator lead ID |\n| `name`, `firstName`, `lastName` | string | Name |\n| `memberUrn` | string | LinkedIn member URN |\n| `profileUrl` | string | Public LinkedIn profile URL |\n| `salesNavUrl` | string | Sales Navigator lead URL |\n| `networkDistance` | string | Connection degree |\n| `premium` | boolean | LinkedIn Premium subscriber |\n| `openProfile` | boolean | Accepts free InMail |\n| `pendingInvitation` | boolean | Connection request already sent |\n| `currentPositions` | array | With company, role, tenure details |\n\n## Credits\n1 credit per 10 items returned."
      tags:
        - "Sales Navigator Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              keywords: "developer"
              tenure:
                - min: 5
              profileLanguage:
                - "en"
            schema:
              type: "object"
              properties:
                category:
                  description: "Type of Sales Navigator search: 'people' (leads) or 'companies' (accounts). Required unless url is provided."
                  type: "string"
                  enum:
                    - "people"
                    - "companies"
                url:
                  description: "Sales Navigator search URL — paste directly from your browser. Category and filters are extracted automatically. Explicit params override URL-derived values. Example: https://www.linkedin.com/sales/search/people?query=..."
                  type: "string"
                keywords:
                  description: "Search keywords. Supports LinkedIn Boolean syntax: use double quotes for exact phrases, AND/OR/NOT operators (UPPERCASE), and parentheses for grouping."
                  type: "string"
                title:
                  description: "Job title keywords (people only). Supports Boolean OR: 'CEO OR CTO OR Founder'."
                  type: "string"
                company:
                  description: "Company filter with include/exclude (people only). Use LinkedIn company IDs. Resolve via /search/linkedin/parameters with type='COMPANY'."
                  type: "object"
                  properties:
                    include:
                      description: "IDs to include"
                      type: "array"
                      items:
                        type: "string"
                    exclude:
                      description: "IDs to exclude"
                      type: "array"
                      items:
                        type: "string"
                industry:
                  description: "Industry filter with include/exclude. Use LinkedIn industry IDs. Resolve via /search/linkedin/parameters with type='INDUSTRY'."
                  type: "object"
                  properties:
                    include:
                      description: "IDs to include"
                      type: "array"
                      items:
                        type: "string"
                    exclude:
                      description: "IDs to exclude"
                      type: "array"
                      items:
                        type: "string"
                location:
                  description: "Geography IDs (people & companies). Resolve via /search/linkedin/parameters with type='GEO'."
                  type: "array"
                  items:
                    type: "string"
                seniority:
                  description: "Seniority levels (people only). Values: '1'=Intern, '2'=Entry, '3'=Associate, '4'=Mid-Senior, '5'=Director, '6'=VP, '7'=CXO, '8'=Partner, '9'=Owner, '10'=Training."
                  type: "array"
                  items:
                    type: "string"
                function:
                  description: "Job function IDs (people only). Resolve via /search/linkedin/parameters."
                  type: "array"
                  items:
                    type: "string"
                tenure:
                  description: "Years at current company (people only). Array of ranges, e.g. [{min:3}, {max:10}]."
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      min:
                        description: "Minimum years"
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      max:
                        description: "Maximum years"
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                profileLanguage:
                  description: "Profile language codes e.g. ['en','fr'] (people only)."
                  type: "array"
                  items:
                    type: "string"
                connectionDegree:
                  description: "Network distance: '1'=1st, '2'=2nd, '3'=3rd+ (people only)."
                  type: "array"
                  items:
                    type: "string"
                school:
                  description: "School IDs (people only). Resolve via /search/linkedin/parameters."
                  type: "array"
                  items:
                    type: "string"
                yearsOfExperience:
                  description: "Overall years of experience ranges (people only). Values: 'lessThanOne', 'oneToTwo', 'threeToFive', 'sixToTen', 'moreThanTen'."
                  type: "array"
                  items:
                    type: "string"
                start:
                  description: "Pagination offset (default 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 25, max 25)."
                  type: "integer"
                  minimum: 1
                  maximum: 25
