  /campaigns/{campaignSlug}/stats:
    get:
      operationId: "getCampaignStats"
      x-speakeasy-name-override: "stats"
      summary: "Get aggregate campaign statistics"
      description: "Returns per-action counts, unique profile count, and total credits used for a campaign. 0 credits, no rate limit."
      tags:
        - "campaigns"
      security:
        - token: []
      parameters:
        - name: "campaignSlug"
          in: "path"
          required: true
          description: "Campaign identifier"
          schema:
            type: "string"
            pattern: "^[a-zA-Z0-9_-]+$"
      responses:
        "200":
          description: "Aggregate campaign statistics"
          content:
            application/json:
              example:
                success: true
                stats:
                  message: 45
                  reply: 120
                  like: 130
                  visit: 200
                  connect: 5
                totalProfiles: 210
                creditsUsed: 500
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  stats:
                    type: "object"
                    additionalProperties:
                      type: "number"
                    description: "Per-action-type counts (e.g. message: 45, reply: 120)"
                  totalProfiles:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Unique profiles processed in this campaign"
                  creditsUsed:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Total credits consumed by this campaign (sum of action counts). Also serves as the per-call creditsUsed (always 0 for this endpoint)."
                  retryAfter:
