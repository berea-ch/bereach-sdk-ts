                  type: "array"
                  items:
                    type: "string"
                authorCompany:
                  description: "Author company IDs (posts only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                connectionDegree:
                  description: "Connection degree: F=1st, S=2nd, O=3rd+ (people only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "F"
                      - "S"
                      - "O"
                firstName:
                  description: "First name filter (people only)"
                  type: "string"
                lastName:
                  description: "Last name filter (people only)"
                  type: "string"
                title:
                  description: "Job title filter (people only). Supports LinkedIn Boolean OR syntax: 'CEO OR CTO OR CMO'. Pipe separators are auto-converted: 'CEO|CTO|CMO' becomes 'CEO OR CTO OR CMO'. Use quotes for exact multi-word titles: '\"Head of Marketing\"'."
                  type: "string"
                connectionOf:
                  description: "Profile URN to find connections of (people only)"
                  type: "string"
                profileLanguage:
                  description: "Profile language codes e.g. ['en','fr'] (people only)"
                  type: "array"
                  items:
                    type: "string"
                school:
                  description: "School IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                location:
                  description: "Geo IDs (people, companies, jobs -- resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                industry:
                  description: "Industry IDs (people, companies -- resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                currentCompany:
                  description: "Current company IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                pastCompany:
                  description: "Past company IDs (people only, resolve via /search/parameters)"
                  type: "array"
                  items:
                    type: "string"
                companySize:
                  description: "Company size: A=1-10, B=11-50, C=51-200, D=201-500, E=501-1K, F=1K-5K, G=5K-10K, H=10K+, I=self (companies only)"
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "A"
