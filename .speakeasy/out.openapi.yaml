                          nullable: true
                          type: "string"
                        industry:
                          nullable: true
                          type: "string"
                        location:
                          nullable: true
                          type: "string"
                        followersCount:
                          nullable: true
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                      required:
                        - "type"
