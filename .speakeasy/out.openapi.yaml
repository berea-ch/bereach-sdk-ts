                              type: "array"
                              items:
                                type: "string"
                                maxLength: 100
                          required:
                            - "set"
                      description: "Tag operations: { add, remove } or { set }"
                  description: "Fields to update on all matching contacts"
              required:
                - "contactIds"
                - "update"
