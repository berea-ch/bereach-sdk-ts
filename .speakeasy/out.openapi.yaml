                  type: "string"
                keywords:
                  description: "Search keywords. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"outreach automation\"), AND to require both terms, OR for alternatives (e.g. CEO OR founder), NOT to exclude (e.g. manager NOT assistant), and parentheses to group (e.g. (CEO OR CTO) AND SaaS). Operators must be UPPERCASE. Without quotes, multi-word queries are treated as AND by default which may return overly broad results — use exact phrases with quotes for precise matching."
                  type: "string"
                sortBy:
