                    anyOf:
                      - type: "array"
                        items:
                          type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "POST"
                            postUrl:
                              type: "string"
                            text:
                              type: "string"
                            date:
                              type: "integer"
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            likesCount:
