                success: true
                category: "people"
                items:
                  - type: "PEOPLE"
                    name: "Jane Smith"
                    profileUrl: "https://www.linkedin.com/in/janesmith"
                    headline: "Senior Product Manager at Google"
                    location: "San Francisco Bay Area"
                    profilePicture: null
