    patch:
      operationId: "bulkUpdate"
      x-speakeasy-name-override: "bulkUpdate"
      summary: "Bulk update contacts"
      description: "Update multiple contacts at once. Same fields as single update. Max 500 contacts per request. 0 credits."
      tags:
        - "contacts"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                contactIds:
                  minItems: 1
                  maxItems: 500
                  type: "array"
                  items:
                    type: "string"
                  description: "Contact IDs to update"
                update:
                  type: "object"
                  properties:
                    lifecycleStage:
                      type: "string"
                      enum:
                        - "contact"
                        - "lead"
                        - "qualified"
                        - "approved"
                        - "rejected"
                    hotScore:
                      type: "integer"
                      minimum: 0
                      maximum: 100
                    qualificationNotes:
                      type: "string"
                    notes:
                      type: "string"
                    outreachStatus:
                      type: "string"
                      enum:
                        - "none"
                        - "connection_sent"
                        - "connected"
                        - "dm_sent"
                        - "followed_up"
                        - "replied"
                        - "in_conversation"
                        - "meeting_booked"
                        - "converted"
                        - "not_interested"
                    nextFollowUpAt:
                      nullable: true
                      type: "string"
                      format: "date-time"
                      pattern: "^(?:(?:\\d\\d[2468][048]|\\d\\d[13579][26]|\\d\\d0[48]|[02468][048]00|[13579][26]00)-02-29|\\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\\d|30)|(?:02)-(?:0[1-9]|1\\d|2[0-8])))T(?:(?:[01]\\d|2[0-3]):[0-5]\\d(?::[0-5]\\d(?:\\.\\d+)?)?(?:Z))$"
                    doNotContact:
                      type: "boolean"
                    tags:
                      anyOf:
                        - type: "object"
                          properties:
                            add:
                              maxItems: 50
                              type: "array"
                              items:
                                type: "string"
                                maxLength: 100
                            remove:
                              maxItems: 50
                              type: "array"
                              items:
                                type: "string"
                                maxLength: 100
                          required:
                            - "add"
                        - type: "object"
                          properties:
                            add:
                              maxItems: 50
                              type: "array"
                              items:
                                type: "string"
                                maxLength: 100
                            remove:
                              maxItems: 50
                              type: "array"
                              items:
                                type: "string"
                                maxLength: 100
