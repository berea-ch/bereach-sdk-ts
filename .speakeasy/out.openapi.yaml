  /contacts/search:
    get:
      operationId: "searchContacts"
      x-speakeasy-name-override: "search"
      summary: "Search and filter contacts"
      description: "Search contacts with flexible filters: name, LinkedIn URL, lifecycle stage, outreach status, tags, hot score, follow-up date, campaign membership, and more. Supports pagination and sorting. 0 credits."
      tags:
        - "contacts"
      security:
        - token: []
      parameters:
        - in: "query"
          name: "linkedinUrl"
          schema:
            description: "Filter by LinkedIn URL (exact match)"
            type: "string"
          description: "Filter by LinkedIn URL (exact match)"
        - in: "query"
          name: "name"
          schema:
            description: "Filter by name (partial match)"
            type: "string"
          description: "Filter by name (partial match)"
        - in: "query"
          name: "lifecycleStage"
          schema:
            type: "string"
            enum:
              - "contact"
              - "lead"
              - "qualified"
              - "approved"
              - "rejected"
        - in: "query"
          name: "sortBy"
          schema:
            description: "Sort field (e.g. 'hotScore', 'createdAt', 'nextFollowUpAt')"
            type: "string"
          description: "Sort field (e.g. 'hotScore', 'createdAt', 'nextFollowUpAt')"
        - in: "query"
          name: "minHotScore"
          schema:
            type: "integer"
            minimum: 0
            maximum: 100
        - in: "query"
          name: "outreachStatus"
          schema:
            type: "string"
            enum:
              - "none"
              - "connection_sent"
              - "connected"
              - "dm_sent"
              - "followed_up"
              - "replied"
              - "in_conversation"
              - "meeting_booked"
              - "converted"
              - "not_interested"
        - in: "query"
          name: "tag"
          schema:
            description: "Filter by tag"
            type: "string"
          description: "Filter by tag"
        - in: "query"
          name: "followUpBefore"
          schema:
            description: "ISO date: contacts with nextFollowUpAt before this date"
            type: "string"
          description: "ISO date: contacts with nextFollowUpAt before this date"
        - in: "query"
          name: "doNotContact"
          schema:
            type: "string"
            enum:
              - "true"
              - "false"
        - in: "query"
          name: "hasProfileData"
          schema:
            type: "string"
            enum:
              - "true"
              - "false"
        - in: "query"
          name: "campaignId"
          schema:
            type: "string"
        - in: "query"
          name: "limit"
          schema:
            default: 50
            type: "integer"
            minimum: 1
            maximum: 200
        - in: "query"
          name: "offset"
          schema:
            default: 0
            type: "integer"
            minimum: 0
            maximum: 9007199254740991
      responses:
        "200":
          description: "Matching contacts"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  contacts:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        id:
                          type: "string"
                        linkedinUrl:
                          type: "string"
                        profileUrn:
                          nullable: true
                          description: "LinkedIn profile URN (e.g. urn:li:fsd_profile:ACoAAA...)"
                          type: "string"
                        publicIdentifier:
                          nullable: true
                          description: "LinkedIn vanity slug (e.g. joshuaau)"
                          type: "string"
                        name:
                          type: "string"
                        lifecycleStage:
                          type: "string"
                        hotScore:
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        qualificationNotes:
                          nullable: true
                          type: "string"
                        notes:
                          nullable: true
                          type: "string"
                        stageChangedAt:
                          nullable: true
                          type: "string"
                        profileData:
                          nullable: true
                        profileUpdatedAt:
                          nullable: true
                          type: "string"
                        conversationData:
                          nullable: true
                        conversationUpdatedAt:
                          nullable: true
                          type: "string"
                        outreachStatus:
                          type: "string"
                        lastContactedAt:
                          nullable: true
                          type: "string"
                        lastRepliedAt:
                          nullable: true
                          type: "string"
                        nextFollowUpAt:
                          nullable: true
                          type: "string"
                        doNotContact:
                          type: "boolean"
                        tags:
                          type: "array"
                          items:
                            type: "string"
                        createdAt:
                          type: "string"
                        updatedAt:
                          type: "string"
                        campaigns:
                          type: "array"
                          items:
                            type: "object"
                            properties:
                              campaignId:
                                type: "string"
                              campaignName:
                                type: "string"
                              campaignStatus:
                                type: "string"
