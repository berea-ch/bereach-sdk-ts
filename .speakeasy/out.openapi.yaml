                        headline:
                          nullable: true
                          type: "string"
                        profileUrl:
                          nullable: true
                          type: "string"
                        profilePicture:
                          nullable: true
                          type: "string"
                        followerCount:
                          nullable: true
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        following:
                          type: "boolean"
                          description: "Whether you follow this person back"
                        profileUrn:
                          nullable: true
                          description: "LinkedIn profile URN (e.g. urn:li:fsd_profile:ACoAAA...) when available"
