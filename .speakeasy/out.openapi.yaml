                  description: "Search keywords (required). Searches across post text content. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"AI automation\"), AND to require both terms, OR for alternatives (e.g. \"growth hacking\" OR \"growth marketing\"), NOT to exclude (e.g. outreach NOT webinar), and parentheses to group (e.g. (AI OR ML) AND \"case study\"). Operators must be UPPERCASE. Without quotes, multi-word queries are treated as AND by default which may return broad results."
                  type: "string"
                url:
                  description: "Optional LinkedIn search URL. If provided, keywords and filters are extracted from the URL. Explicit params override URL-derived values."
                  type: "string"
                sortBy:
                  description: "Sort order. 'relevance' (default) returns the most relevant posts. 'date' returns the most recent posts first."
                  type: "string"
                  enum:
                    - "relevance"
                    - "date"
                datePosted:
