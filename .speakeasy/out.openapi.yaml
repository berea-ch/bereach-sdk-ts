                          nullable: true
                          type: "string"
                        type:
                          type: "string"
                          enum:
                            - "comment"
                        commentText:
                          type: "string"
                        timestamp:
                          nullable: true
                          type: "integer"
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        isEdited:
                          type: "boolean"
                        commentUrn:
                          description: "Full comment URN — use directly for /reply and /like endpoints. Do NOT reconstruct from hash fields."
                          type: "string"
                        commentHash:
                          description: "SHA256 hash of commentUrn — use for dedup slugs only, not for building URNs."
                          type: "string"
                        isPostAuthor:
                          description: "True if the commenter is the post author."
                          type: "boolean"
