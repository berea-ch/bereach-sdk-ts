  /search/linkedin/people:
    post:
      operationId: "searchLinkedInPeople"
      summary: "Search LinkedIn People"
      description: "# Search LinkedIn People\n\nFind professionals on LinkedIn by name, title, company, location, industry, and more. Returns structured profile data including name, headline, current positions, and connection degree.\n\n## Parameters\n- **keywords** (optional): Search terms matched against name, headline, company, skills, and bio\n- You can search by filters alone (no keywords) — e.g. find all 2nd-degree connections in Paris\n\n## Keyword syntax (Boolean operators)\nKeywords support LinkedIn Boolean search syntax:\n- **Exact phrase**: `\"product manager\"` — matches only that exact title\n- **AND**: `engineer AND startup` — both terms required (spaces default to AND)\n- **OR**: `CEO OR founder OR CTO` — any of the terms\n- **NOT**: `manager NOT assistant` — exclude unwanted terms\n- **Parentheses**: `(CEO OR CTO) AND SaaS` — group logic\n\nOperators must be **UPPERCASE**. Precedence: Quotes > Parentheses > NOT > AND > OR.\n\n## Available filters\n| Filter | Type | Description | Resolve IDs via |\n|--------|------|-------------|------------------|\n| `connectionDegree` | `[\"F\"\\|\"S\"\\|\"O\"]` | Connection level: F=1st, S=2nd, O=3rd+ | — |\n| `firstName` | string | Exact first name match | — |\n| `lastName` | string | Exact last name match | — |\n| `title` | string | Current job title (supports `\\|` OR syntax: `\"CEO\\|CTO\"`) | — |\n| `connectionOf` | string | Profile URN — find their connections | — |\n| `profileLanguage` | string[] | ISO 639-1 codes: `[\"en\",\"fr\"]` | — |\n| `location` | string[] | Geo IDs | `/search/linkedin/parameters` type=`GEO` |\n| `industry` | string[] | Industry IDs | `/search/linkedin/parameters` type=`INDUSTRY` |\n| `currentCompany` | string[] | Company IDs (current employer) | `/search/linkedin/parameters` type=`COMPANY` |\n| `pastCompany` | string[] | Company IDs (past employer) | `/search/linkedin/parameters` type=`COMPANY` |\n| `school` | string[] | School/university IDs | `/search/linkedin/parameters` type=`SCHOOL` |\n\n## Response fields (per item)\n| Field | Type | Description |\n|-------|------|-------------|\n| `name` | string | Full display name |\n| `profileUrl` | string | LinkedIn profile URL |\n| `headline` | string\\|null | Professional headline |\n| `location` | string\\|null | Geographic location |\n| `profilePicture` | string\\|null | Profile photo URL |\n| `networkDistance` | string\\|null | `DISTANCE_1`, `DISTANCE_2`, `DISTANCE_3`, or `OUT_OF_NETWORK` |\n| `currentPositions` | array | Current job positions with `company` and `role` |\n\n## Pagination\n- Default page size: 10, max: 50\n- Use `start` + `count` to paginate. Check `hasMore` for more pages.\n- LinkedIn caps total visible results at ~1,000 for most searches.\n\n## Example workflows\n1. **Prospect list building**: Search by title + location + industry → build a targeted outreach list\n2. **Recruiting**: Search by title + company + school → find qualified candidates\n3. **Network mapping**: Search `connectionOf` + filters → explore someone's network\n\n## Multi-step workflow with filter ID resolution\n```\nStep 1: POST /search/linkedin/parameters { type: 'GEO', keywords: 'San Francisco' }\n        → returns [{ id: '102277331', title: 'San Francisco, CA' }]\nStep 2: POST /search/linkedin/parameters { type: 'COMPANY', keywords: 'Google' }\n        → returns [{ id: '1441', title: 'Google' }]\nStep 3: POST /search/linkedin/people { keywords: 'product manager', location: ['102277331'], currentCompany: ['1441'] }\n        → returns matching people\n```\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              keywords: "product manager"
              connectionDegree:
                - "S"
              location:
                - "103644278"
              currentCompany:
                - "1441"
              count: 10
              start: 0
            schema:
              type: "object"
              properties:
                keywords:
                  description: "Search keywords. Matches against name, headline, company, skills, and bio. Optional — you can search by filters alone (e.g. all 2nd-degree connections in Paris). Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"product manager\"), AND to require both terms, OR for alternatives (e.g. CEO OR founder OR CTO), NOT to exclude (e.g. manager NOT assistant), and parentheses to group (e.g. (CEO OR CTO) AND SaaS). Operators must be UPPERCASE."
                  type: "string"
                url:
                  description: "Optional LinkedIn search URL. If provided, keywords and filters are extracted from the URL. Explicit params override URL-derived values."
                  type: "string"
                connectionDegree:
                  description: "Filter by connection degree. 'F' = 1st degree (your direct connections), 'S' = 2nd degree (connections of connections), 'O' = 3rd+ degree and out of network. Accepts multiple values, e.g. ['F','S'] for 1st and 2nd degree."
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "F"
                      - "S"
                      - "O"
                firstName:
                  description: "Filter by first name. Exact match (case-insensitive)."
                  type: "string"
                lastName:
                  description: "Filter by last name. Exact match (case-insensitive)."
                  type: "string"
                title:
                  description: "Filter by current job title. Matches against the person's current position title. Supports boolean OR syntax with '|' separator. Example: 'CEO|CTO|Founder' finds people with any of these titles."
                  type: "string"
                connectionOf:
                  description: "Find connections of a specific person. Pass the person's LinkedIn profile URN (e.g. 'urn:li:fsd_profile:ACoAABZ0Qo4B...'). Returns people who are connected to this person."
                  type: "string"
                profileLanguage:
                  description: "Filter by LinkedIn profile language. Array of ISO 639-1 codes. Example: ['en'] for English profiles, ['en','fr'] for English or French profiles."
                  type: "array"
                  items:
                    type: "string"
                school:
                  description: "Filter by school/university. Array of LinkedIn school IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='SCHOOL'. Example: resolve 'Harvard' to get school IDs."
                  type: "array"
                  items:
                    type: "string"
                location:
                  description: "Filter by geographic location. Array of LinkedIn geo IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='GEO'. Example: resolve 'San Francisco' → '102277331'."
                  type: "array"
                  items:
                    type: "string"
                industry:
                  description: "Filter by industry. Array of LinkedIn industry IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='INDUSTRY'."
                  type: "array"
                  items:
                    type: "string"
                currentCompany:
                  description: "Filter by current employer. Array of LinkedIn company IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='COMPANY'. Example: resolve 'Google' → '1441'."
                  type: "array"
                  items:
                    type: "string"
                pastCompany:
                  description: "Filter by past employer. Array of LinkedIn company IDs. Finds people who previously worked at these companies."
                  type: "array"
                  items:
                    type: "string"
                start:
                  description: "Pagination offset (default 0). Use multiples of `count` to page through results."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50)."
                  type: "integer"
                  minimum: 1
                  maximum: 50
      responses:
