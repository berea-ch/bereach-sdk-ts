  /campaigns/{campaignSlug}/sync:
    post:
      operationId: "sync"
      x-speakeasy-name-override: "sync"
      summary: "Mark actions as completed without performing them"
      description: "Manually mark actions as completed for profiles within a campaign. Use when actions were performed outside the API (e.g. manual DMs) and need to be synced. 0 credits, no rate limit."
      tags:
        - "campaigns"
      security:
        - token: []
      parameters:
        - name: "campaignSlug"
          in: "path"
          required: true
          description: "Campaign identifier"
          schema:
            type: "string"
            pattern: "^[a-zA-Z0-9_-]+$"
      requestBody:
        required: true
        content:
          application/json:
            example:
              profiles:
                - profile: "https://www.linkedin.com/in/john-doe"
                  actions:
                    - "message"
                    - "reply"
            schema:
              type: "object"
              properties:
                profiles:
                  minItems: 1
                  maxItems: 500
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      profile:
                        type: "string"
                        description: "LinkedIn profile URL or URN"
                      actions:
                        minItems: 1
                        type: "array"
                        items:
                          type: "string"
                          enum:
                            - "message"
                            - "reply"
                            - "like"
                            - "visit"
                            - "connect"
                        description: "Action types to mark as completed"
                    required:
                      - "profile"
                      - "actions"
                  description: "Profiles and actions to mark as completed without performing them on LinkedIn."
              required:
                - "profiles"
      responses:
        "200":
          description: "Actions marked as completed"
          content:
            application/json:
              example:
                success: true
                synced:
                  - profile: "https://www.linkedin.com/in/john-doe"
                    actions:
                      message: true
                      reply: true
                creditsUsed: 0
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  synced:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        profile:
                          type: "string"
