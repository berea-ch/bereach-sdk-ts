  /search/linkedin/parameters:
    post:
      operationId: "resolveLinkedInSearchParameters"
      summary: "Resolve text to LinkedIn search parameter IDs (typeahead)"
      description: "# Resolve Search Parameters\n\nConverts human-readable text into LinkedIn numeric IDs required by search filters. This is a **prerequisite step** before using location, industry, company, or school filters in any search endpoint.\n\n## Supported types\n| Type | Description | Use with filter |\n|------|-------------|------------------|\n| `GEO` | Geographic locations (cities, regions, countries) | `location` filter in people, companies, jobs |\n| `COMPANY` | Companies and organizations | `currentCompany`, `pastCompany`, `authorCompany` |\n| `INDUSTRY` | Industries and sectors | `industry`, `authorIndustry` |\n| `SCHOOL` | Schools and universities | `school` filter in people search |\n| `CONNECTIONS` | Your LinkedIn connections by name | Identify connection URNs |\n| `PEOPLE` | Any LinkedIn user by name | Identify profile URNs for `connectionOf` |\n\n## How to use\n```\nStep 1: POST /search/linkedin/parameters { type: 'GEO', keywords: 'Paris' }\n        → [{ id: '105015875', title: 'Paris, Île-de-France, France', type: 'GEO' }]\nStep 2: POST /search/linkedin/people { location: ['105015875'], keywords: 'engineer' }\n        → returns engineers in Paris\n```\n\n## Response format\nEach item contains `id` (the LinkedIn numeric ID to use in filters), `title` (human-readable label), and `type` (the parameter type).\n\n## Tips\n- Use short, specific keywords for best results (e.g. `\"Paris\"` not `\"Paris, France\"`)\n- The API returns up to `limit` results (default 10, max 50)\n- Results are ranked by relevance\n- IDs are stable — you can cache them for repeated searches"
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              type: "GEO"
              keywords: "San Francisco"
              limit: 5
            schema:
              type: "object"
              properties:
                type:
                  description: "Parameter type to resolve"
                  type: "string"
                  enum:
                    - "GEO"
                    - "COMPANY"
                    - "INDUSTRY"
                    - "SCHOOL"
                    - "CONNECTIONS"
                    - "PEOPLE"
                keywords:
                  description: "Text to resolve into LinkedIn IDs"
                  type: "string"
                  minLength: 1
                limit:
                  description: "Max results (default 10, max 50)"
                  type: "integer"
                  minimum: 1
                  maximum: 50
              required:
                - "type"
                - "keywords"
      responses:
        "200":
          description: "Resolved search parameter items"
          content:
            application/json:
              example:
                success: true
                items:
                  - id: "103644278"
                    title: "San Francisco Bay Area"
                    type: "GEO"
                  - id: "102277331"
                    title: "San Francisco, California, United States"
                    type: "GEO"
                count: 2
