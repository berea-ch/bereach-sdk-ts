      operationId: "collectLinkedInLikes"
      summary: "Scrape LinkedIn post likes"
      description: "Authenticates the requester, validates LinkedIn credentials, and returns up to 200 profiles per page that reacted to the specified post. Supports pagination."
      tags:
        - "LinkedIn Scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              postUrl: "https://www.linkedin.com/feed/update/urn:li:activity:1234567890123456789/"
              start: 0
            schema:
              type: "object"
              properties:
                postUrl:
                  description: "LinkedIn post URL to inspect for reactions."
                  type: "string"
                start:
                  description: "Pagination offset (multiples of 200)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
              required:
                - "postUrl"
      responses:
