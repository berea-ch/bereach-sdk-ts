  /search/linkedin/posts:
    post:
      operationId: "searchLinkedInPosts"
      summary: "Search LinkedIn Posts"
      description: "# Search LinkedIn Posts\n\nSearch LinkedIn's content index for posts matching your keywords and filters. Returns structured post data including full text, engagement metrics, author info, and URLs.\n\n## Required parameters\n- **keywords** (string, required): The search terms to match against post content. Examples: `\"AI automation\"`, `\"remote work trends\"`, `\"SaaS growth strategies\"`.\n\n## Keyword syntax (Boolean operators)\nKeywords support LinkedIn Boolean search syntax:\n- **Exact phrase**: `\"outreach automation\"` — matches only that exact phrase\n- **AND**: `AI AND marketing` — both terms required (spaces default to AND)\n- **OR**: `\"growth hacking\" OR \"growth marketing\"` — either term\n- **NOT**: `outreach NOT webinar` — exclude unwanted terms\n- **Parentheses**: `(AI OR ML) AND \"case study\"` — group logic\n\nOperators must be **UPPERCASE**. Precedence: Quotes > Parentheses > NOT > AND > OR.\n\n## Available filters\n| Filter | Type | Description |\n|--------|------|-------------|\n| `sortBy` | `\"relevance\"` \\| `\"date\"` | Sort by relevance (default) or most recent first |\n| `datePosted` | `\"past-24h\"` \\| `\"past-week\"` \\| `\"past-month\"` | Filter by publication recency |\n| `contentType` | `\"images\"` \\| `\"videos\"` \\| `\"documents\"` | Filter by media type |\n| `authorIndustry` | string[] | Author's industry IDs (resolve via `/search/linkedin/parameters` with type=`INDUSTRY`) |\n| `authorCompany` | string[] | Author's company IDs (resolve via `/search/linkedin/parameters` with type=`COMPANY`) |\n\n## Response fields (per item)\n| Field | Type | Description |\n|-------|------|-------------|\n| `postUrl` | string | Direct URL to the LinkedIn post |\n| `text` | string | Full post text content |\n| `date` | number | Publication timestamp (ms since epoch) |\n| `likesCount` | number | Total reactions |\n| `commentsCount` | number | Total comments |\n| `sharesCount` | number | Total shares/reposts |\n| `author.name` | string | Author's display name |\n| `author.profileUrl` | string | Author's LinkedIn profile URL |\n| `author.headline` | string | Author's headline |\n| `author.isCompany` | boolean | Whether the author is a company page |\n| `isRepost` | boolean | Whether this is a repost of another post |\n\n## Pagination\n- Default page size: 10, max: 50\n- Use `start` + `count` to paginate: `start=0, count=10` → page 1, `start=10, count=10` → page 2\n- Check `hasMore` in the response to know if more pages exist\n- `paging.total` gives the estimated total number of results\n\n## Example workflows\n1. **Content research**: Search for trending topics → analyze top posts → extract engagement patterns\n2. **Lead generation**: Search for posts about problems your product solves → extract author profiles\n3. **Competitive intelligence**: Search for competitor mentions → track sentiment and engagement\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              keywords: "AI automation"
              sortBy: "date"
              datePosted: "past-week"
              count: 10
              start: 0
            schema:
              type: "object"
              properties:
                keywords:
                  description: "Search keywords (required). Searches across post text content. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"AI automation\"), AND to require both terms, OR for alternatives (e.g. \"growth hacking\" OR \"growth marketing\"), NOT to exclude (e.g. outreach NOT webinar), and parentheses to group (e.g. (AI OR ML) AND \"case study\"). Operators must be UPPERCASE. Without quotes, multi-word queries are treated as AND by default which may return broad results."
                  type: "string"
                url:
                  description: "Optional LinkedIn search URL. If provided, keywords and filters are extracted from the URL. Explicit params override URL-derived values."
                  type: "string"
                sortBy:
                  description: "Sort order. 'relevance' (default) returns the most relevant posts. 'date' returns the most recent posts first."
                  type: "string"
                  enum:
                    - "relevance"
                    - "date"
                datePosted:
                  description: "Filter by publication date. Useful for finding recent discussions or trending topics."
                  type: "string"
                  enum:
                    - "past-24h"
                    - "past-week"
                    - "past-month"
                contentType:
                  description: "Filter by media type. Only return posts that contain the specified media. 'images' = photo posts, 'videos' = video posts, 'documents' = carousel/PDF posts."
                  type: "string"
                  enum:
                    - "images"
                    - "videos"
                    - "documents"
                authorIndustry:
                  description: "Filter by the post author's industry. Array of LinkedIn industry IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='INDUSTRY'. Example: resolve 'Technology' to get industry IDs."
                  type: "array"
                  items:
                    type: "string"
                authorCompany:
                  description: "Filter by the post author's company. Array of LinkedIn company IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='COMPANY'. Example: resolve 'Google' to get company ID '1441'."
                  type: "array"
                  items:
                    type: "string"
                start:
                  description: "Pagination offset (default 0). Use multiples of `count` to page through results. Example: start=0 for page 1, start=10 for page 2 (with count=10)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50). Controls how many posts are returned per request."
                  type: "integer"
                  minimum: 1
                  maximum: 50
              required:
                - "keywords"
