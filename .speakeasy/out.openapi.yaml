      x-speakeasy-group: linkedInActions
  /publish/linkedin/post:
    post:
      operationId: "publishPost"
      x-speakeasy-name-override: "publishPost"
      summary: "Publish or schedule a LinkedIn post"
      description: "Creates a new LinkedIn post. Supports instant publishing and scheduled posting. Optionally attach an image by providing its URL (imageUrl) or base64-encoded data (imageBase64). Rate limited to 80 actions per day per user. Consumes 1 credit per post."
      tags:
        - "actions"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              text: "Excited to share our latest product update! Check it out."
              mode: "instant"
              visibility: "ANYONE"
              campaignSlug: "product-launch-2026"
            schema:
              type: "object"
              properties:
                text:
                  type: "string"
                  minLength: 1
                  description: "Post commentary text"
                mode:
                  type: "string"
                  enum:
                    - "scheduled"
                    - "instant"
                  description: "Publish mode: 'instant' publishes immediately, 'scheduled' schedules for later"
                scheduledAt:
                  description: "Timestamp in milliseconds for scheduled posts (required when mode='scheduled')"
                  type: "integer"
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                companyId:
                  description: "If provided, post will be published as this company page (organization ID). User must be admin of the page."
                  type: "string"
                imageUrl:
                  description: "URL of an image to attach to the post. Mutually exclusive with imageBase64."
                  type: "string"
                  format: "uri"
                imageBase64:
                  description: "Base64-encoded image data to attach to the post (e.g. data:image/png;base64,iVBOR... or raw base64). Mutually exclusive with imageUrl."
                  type: "string"
                imageFileName:
                  description: "Filename for the uploaded image (e.g. 'banner.png'). Used with imageBase64. Defaults to 'image.jpg'."
                  type: "string"
                visibility:
                  default: "ANYONE"
                  description: "Post visibility"
                  type: "string"
                  enum:
                    - "ANYONE"
                    - "CONNECTIONS"
                mentions:
                  description: "Profile mentions with text positions"
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      profileUrn:
                        type: "string"
                        description: "LinkedIn profile URN of the mentioned person (e.g., 'urn:li:fsd_profile:ACoAABZ0Qo4B...')"
                      start:
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: "Start character offset in the text where the mention begins"
                      length:
                        type: "integer"
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: "Length of the mention text in characters"
                    required:
                      - "profileUrn"
                      - "start"
                      - "length"
                campaignSlug:
                  description: "Campaign identifier for deduplication."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                actionSlug:
                  deprecated: true
                  description: "Deprecated. Use campaignSlug only."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
              required:
                - "text"
                - "mode"
      responses:
        "200":
          description: "Post published or scheduled successfully"
          content:
            application/json:
              example:
                success: true
                shareUrn: "urn:li:fsd_share:urn:li:share:7431487422175211520"
                activityUrn: "urn:li:activity:7431487422519062528"
                creditsUsed: 1
                retryAfter: 0
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  shareUrn:
                    type: "string"
                    description: "URN of the created share (e.g., 'urn:li:fsd_share:urn:li:share:123...')"
                  activityUrn:
                    nullable: true
                    description: "Activity URN (only available for instant mode)"
                    type: "string"
                  duplicate:
                    description: "True if this action was already executed for the given campaignSlug + target."
                    type: "boolean"
                  creditsUsed:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Credits consumed by this call (0 for free endpoints, cached results, or duplicates)."
                  retryAfter:
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: "Seconds to wait before making another call of the same type. 0 means no wait needed."
                required:
                  - "success"
