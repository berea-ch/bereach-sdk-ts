                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  processedCount:
                    description: "Number of returned profiles that already have a completed 'message' action in this campaign. Only present when campaignSlug is provided."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  newCount:
                    description: "Number of returned profiles that have NOT yet been messaged in this campaign. Only present when campaignSlug is provided."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  creditsUsed:
                    description: "Credits consumed by this call (0 for free endpoints, cached results, or duplicates)."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  retryAfter:
                    description: "Seconds to wait before making another call of the same type. 0 means no wait needed."
                    type: "integer"
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - "success"
                  - "profiles"
                  - "count"
                  - "total"
                  - "start"
