  /me/linkedin/followers:
    post:
      operationId: "getFollowers"
      x-speakeasy-name-override: "getFollowers"
      summary: "Get authenticated user's LinkedIn followers"
      description: "Returns a paginated list of the authenticated user's LinkedIn followers. LinkedIn caps visible results at ~1 000. No credits consumed. Requires valid LinkedIn credentials."
      tags:
        - "profile"
      security:
        - token: []
      requestBody:
        required: false
        content:
          application/json:
            example:
              start: 0
              count: 10
            schema:
              type: "object"
              properties:
                start:
                  description: "Pagination offset (default 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Number of followers to fetch per page (default 10, max 50)."
                  type: "integer"
                  minimum: 1
                  maximum: 50
      responses:
        "200":
          description: "Paginated list of followers"
          content:
            application/json:
              example:
                success: true
                followers:
                  - name: "Alex Doe"
                    headline: "Growth Lead @ Example"
                    profileUrl: "https://www.linkedin.com/in/alex-doe"
                    profilePicture: "https://media.licdn.com/dms/image/v2/D4E03AQG1/profile-displayphoto-shrink_400_400/profile.jpg"
                    followerCount: 1250
                    following: false
                    publicIdentifier: "alex-doe"
                    profileUrn: "urn:li:fsd_profile:ACoAAD5544332211"
                count: 1
                totalFollowers: 3718
                start: 0
                hasMore: true
                creditsUsed: 0
                retryAfter: 0
