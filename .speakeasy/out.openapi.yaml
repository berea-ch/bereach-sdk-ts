                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "1"
                      - "2"
                      - "3"
                start:
                  description: "Pagination offset (default 0)"
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50)"
                  type: "integer"
                  minimum: 1
                  maximum: 50
