  /visit/linkedin/profile:
    post:
      operationId: "visitProfile"
      x-speakeasy-name-override: "visitProfile"
      summary: "Visit LinkedIn profile and extract contact data"
      description: "Visit a LinkedIn profile and return contact data. Distance-1 profiles cached 24h (0 credits when cached). No dedup — always executes. campaignSlug is for tracking only. 1 credit (0 when cached).\n\nOptional enrichment flags (`includePosts`, `includeComments`, `includeAbout`) fetch additional data in parallel with minimal latency overhead. `includeAbout` fetches the About section and detailed position descriptions. `includeComments` returns posts the profile recently engaged with (topic + author), useful for personalization — note that the actual comment text is not available from this API."
      tags:
        - "scrapers"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              profile: "https://www.linkedin.com/in/alexandre-sarfati"
              campaignSlug: "lead-magnet-post-12345"
              includePosts: true
              includeComments: true
            schema:
              type: "object"
              properties:
                profile:
                  type: "string"
                  description: "LinkedIn profile identifier. Accepts full URLs (e.g. https://www.linkedin.com/in/username), vanity names (e.g. john-doe), or profile URNs (e.g. urn:li:fsd_profile:ACoAAA...)."
                campaignSlug:
                  description: "Optional campaign identifier for tracking only. No dedup — visit always executes."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                actionSlug:
                  deprecated: true
                  description: "Deprecated. Use campaignSlug only."
                  type: "string"
                  pattern: "^[a-zA-Z0-9_-]+$"
                includePosts:
                  description: "When true, fetches the last 5 posts from the profile (fetched in parallel with other enrichments). Defaults to false."
                  type: "boolean"
                includeComments:
                  description: "When true, fetches the last 5 posts the profile recently engaged with via comments. Returns engagement context (target post text, author) but not the comment text itself. Fetched in parallel with includePosts. Defaults to false."
                  type: "boolean"
                includeAbout:
                  description: "When true, fetches the profile's About section and detailed position descriptions via a supplementary API call (fetched in parallel). Defaults to false."
                  type: "boolean"
              required:
                - "profile"
      responses:
        "200":
          description: "Profile contact data"
          content:
            application/json:
              example:
                success: true
                firstName: "Alexandre"
                lastName: "Sarfati"
                headline: "Building cool stuff"
                publicIdentifier: "alexandre-sarfati"
                profileUrl: "https://www.linkedin.com/in/alexandre-sarfati"
