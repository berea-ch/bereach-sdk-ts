  /search/linkedin/companies:
    post:
      operationId: "searchLinkedInCompanies"
      summary: "Search LinkedIn Companies"
      description: "# Search LinkedIn Companies\n\nFind companies on LinkedIn by name, industry, location, and employee count. Returns structured company data including name, industry, location, and follower count.\n\n## Parameters\n- **keywords** (optional): Search terms matched against company name, description, and specialties\n\n## Keyword syntax (Boolean operators)\nKeywords support LinkedIn Boolean search syntax:\n- **Exact phrase**: `\"artificial intelligence\"` — matches only that exact phrase\n- **AND**: `fintech AND payments` — both terms required (spaces default to AND)\n- **OR**: `SaaS OR \"cloud computing\"` — either term\n- **NOT**: `consulting NOT staffing` — exclude unwanted terms\n- **Parentheses**: `(AI OR ML) AND healthcare` — group logic\n\nOperators must be **UPPERCASE**. Precedence: Quotes > Parentheses > NOT > AND > OR.\n\n## Available filters\n| Filter | Type | Description | Resolve IDs via |\n|--------|------|-------------|------------------|\n| `location` | string[] | HQ geo IDs | `/search/linkedin/parameters` type=`GEO` |\n| `industry` | string[] | Industry IDs | `/search/linkedin/parameters` type=`INDUSTRY` |\n| `companySize` | string[] | Employee count codes (see below) | — |\n\n### Company size codes\n| Code | Employees |\n|------|-----------|\n| `A` | 1–10 |\n| `B` | 11–50 |\n| `C` | 51–200 |\n| `D` | 201–500 |\n| `E` | 501–1,000 |\n| `F` | 1,001–5,000 |\n| `G` | 5,001–10,000 |\n| `H` | 10,001+ |\n| `I` | Self-employed |\n\n## Response fields (per item)\n| Field | Type | Description |\n|-------|------|-------------|\n| `name` | string | Company display name |\n| `profileUrl` | string | LinkedIn company page URL |\n| `summary` | string\\|null | Company tagline/description |\n| `industry` | string\\|null | Primary industry |\n| `location` | string\\|null | HQ location |\n| `followersCount` | number\\|null | Number of LinkedIn followers |\n\n## Pagination\n- Default page size: 10, max: 50\n- Use `start` + `count` to paginate. Check `hasMore` for more pages.\n\n## Example workflows\n1. **Market research**: Search by industry + location → map the competitive landscape\n2. **Sales targeting**: Search by industry + size → build a list of target accounts\n3. **Partnership discovery**: Search by keywords + location → find potential partners\n\n## Credits\n1 credit per 20 items returned (minimum 1 credit if any results, 0 if empty)."
      tags:
        - "LinkedIn Search"
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              keywords: "AI startup"
              location:
                - "103644278"
              companySize:
                - "B"
                - "C"
              count: 10
              start: 0
            schema:
              type: "object"
              properties:
                keywords:
                  description: "Search keywords. Matches against company name, description, and specialties. Optional — you can search by filters alone. Supports LinkedIn Boolean syntax: use double quotes for exact phrases (e.g. \"artificial intelligence\"), AND to require both terms, OR for alternatives (e.g. SaaS OR \"cloud computing\"), NOT to exclude (e.g. consulting NOT staffing), and parentheses to group (e.g. (AI OR ML) AND healthcare). Operators must be UPPERCASE."
                  type: "string"
                url:
                  description: "Optional LinkedIn search URL. If provided, keywords and filters are extracted from the URL. Explicit params override URL-derived values."
                  type: "string"
                location:
                  description: "Filter by company HQ location. Array of LinkedIn geo IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='GEO'."
                  type: "array"
                  items:
                    type: "string"
                industry:
                  description: "Filter by company industry. Array of LinkedIn industry IDs. Resolve text to IDs via POST /search/linkedin/parameters with type='INDUSTRY'."
                  type: "array"
                  items:
                    type: "string"
                companySize:
                  description: "Filter by employee count. Multiple values accepted (OR logic). Codes: A=1-10 employees, B=11-50, C=51-200, D=201-500, E=501-1,000, F=1,001-5,000, G=5,001-10,000, H=10,001+, I=Self-employed."
                  type: "array"
                  items:
                    type: "string"
                    enum:
                      - "A"
                      - "B"
                      - "C"
                      - "D"
                      - "E"
                      - "F"
                      - "G"
                      - "H"
                      - "I"
                start:
                  description: "Pagination offset (default 0). Use multiples of `count` to page through results."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
                count:
                  description: "Results per page (default 10, max 50)."
                  type: "integer"
                  minimum: 1
                  maximum: 50
      responses:
        "200":
          description: "List of LinkedIn companies matching the search criteria"
          content:
            application/json:
              example:
                success: true
                category: "companies"
                items:
                  - type: "COMPANY"
                    name: "AI Startup Inc"
                    profileUrl: "https://www.linkedin.com/company/ai-startup-inc"
                    summary: "Building next-gen AI tools for businesses"
                    industry: "Technology, Information and Internet"
                    location: "San Francisco, CA"
                    followersCount: 5200
                paging:
                  start: 0
                  count: 10
                  total: 350
                hasMore: true
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    enum:
                      - true
                  category:
                    type: "string"
                    enum:
                      - "companies"
