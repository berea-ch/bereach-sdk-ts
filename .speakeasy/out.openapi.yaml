              type: "object"
              properties:
                profileUrl:
                  type: "string"
                  description: "LinkedIn profile identifier. Accepts full URLs (e.g. https://www.linkedin.com/in/username), vanity names (e.g. john-doe), or profile URNs (e.g. urn:li:fsd_profile:ACoAAA...)."
                count:
                  description: "Number of posts to fetch (0-100, default 20). Use count=0 for a free total-only check (0 credits, no rate-limit slot consumed)."
                  type: "integer"
                  minimum: 0
                  maximum: 100
                start:
                  description: "Pagination offset (default 0)."
                  type: "integer"
                  minimum: 0
                  maximum: 9007199254740991
